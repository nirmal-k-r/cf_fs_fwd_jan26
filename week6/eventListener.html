<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Event listener</title>
    </head>
    <body>
        <h1>Event listener</h1>
        
        <button id="executeButton">Execute</button>
     

       

        
        <script>

            executeButton=document.getElementById("executeButton");

            //create separate function for event listener
            executeButton.addEventListener("click", execute);

            function execute(){
                
                // let confirmation=prompt("Are you sure you want to execute this action? Type 'yes' to confirm.");
                // if (confirmation == "yes"){
                //     window.location.href="https://www.google.com";
                // }

                let confirmation=confirm("Are you sure you want to execute this action?");
                if (confirmation){
                    window.location.href="https://www.google.com";
                }
            }
            

        </script>
        
    </body>
</html>
