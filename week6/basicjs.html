<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Basic JavaScript</title>
    </head>
    <body>
        <h1 id="title">Basic JavaScript</h1>
        <p id="para">This is an example of basic JavaScript.</p>

        <button onclick="sayHello()">Click me!</button>
        
        <script>
            // alert("Hello world!");

            function sayHello(){
                alert("Hello, welcome to JavaScript!");
            }
            
            let idVal=document.getElementById("title");
            console.log(idVal.innerHTML);
            console.log(idVal.textContent);

            idVal.innerHTML="Advanced JavaScript";

     
            let para=document.querySelector("#para");
            para.innerHTML="new data";
            para.style.color="red";

        </script>
    </body>
</html>
