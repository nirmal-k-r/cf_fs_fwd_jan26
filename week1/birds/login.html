<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
    </head>
    <body>
        <nav>
            <p style="text-align: center;">
                <a href="index.html">Home</a> |
                <a>About</a> |
                <a><b>Login</b></a>
            </p>
            <hr>
        </nav>

        <div>
            <h2>Register for newsletter</h2>
            <form>
                <label for="username">Username:</label>
                <input type="text" name="username" required/>
                <br><br>
                <label for="password">Password:</label>
                <input type="password" name="password" required/>
                <br><br>

                <select name="country">
                    <option value="mauritius">Mauritius</option>
                    <option value="india">India</option>
                    <option value="usa">USA</option>
                    <option value="australia">Australia</option>
                </select>

                <input type="checkbox" name="agreeTerms" /> I agree to the terms and conditions
                <br><br>

                <label> Mr</label> <input type="radio" name="gender" value="male" />   
                <label> Ms</label> <input type="radio" name="gender" value="female" />
                <br><br>

                <input type="date" name="dob" />

                <input type="submit" value="Register" />

            </form>
        </div>
        
    </body>
</html>
